<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Warehouse — Inventory Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8f5e9 100%);
      min-height: 100vh;
    }

    .page-header {
      background: #ffffff;
      border-bottom: 1px solid #e9ecef;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .page-header .brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 700;
      font-size: 1.15rem;
      color: #0066cc;
      text-decoration: none;
    }

    .warehouse-card {
      cursor: pointer;
      border: 2px solid #e9ecef;
      border-radius: 16px;
      transition: all 0.22s ease;
      background: #fff;
      padding: 1.75rem 1.5rem;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .warehouse-card:hover,
    .warehouse-card:focus {
      border-color: #0066cc;
      box-shadow: 0 6px 24px rgba(0,102,204,0.15);
      transform: translateY(-3px);
      outline: none;
    }

    .warehouse-card:active {
      transform: translateY(0);
    }

    .warehouse-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0066cc, #00cc66);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.75rem;
      color: #fff;
    }

    .warehouse-code {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #6c757d;
      margin-bottom: 0.3rem;
    }

    .warehouse-name {
      font-size: 1.15rem;
      font-weight: 700;
      color: #212529;
      margin-bottom: 0.5rem;
    }

    .warehouse-location {
      font-size: 0.85rem;
      color: #6c757d;
    }

    .badge-status {
      font-size: 0.75rem;
      padding: 0.35em 0.75em;
      border-radius: 50px;
    }

    .enter-label {
      margin-top: 1rem;
      font-size: 0.82rem;
      color: #0066cc;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .warehouse-card:hover .enter-label {
      opacity: 1;
    }

    #loadingState, #emptyState, #errorState {
      display: none;
    }

    .spinner-grow {
      color: #0066cc;
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <header class="page-header shadow-sm">
    <a class="brand" href="#">
      <i class="bi bi-boxes" style="font-size:1.5rem;"></i>
      Inventory Management
    </a>
    <div class="d-flex align-items-center gap-3">
      <span class="text-muted" style="font-size:0.9rem;">
        <i class="bi bi-person-circle me-1"></i>
        <span id="managerNameHeader">Manager</span>
      </span>
      <button class="btn btn-sm btn-outline-danger" onclick="handleLogout()">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container py-5">
    <!-- Page heading -->
    <div class="text-center mb-5">
      <h2 class="fw-bold mb-1" style="color:#212529;">
        Welcome back, <span id="managerName" class="text-primary">Manager</span>!
      </h2>
      <p class="text-muted">Select a warehouse to enter and manage inventory.</p>
    </div>

    <!-- Loading state -->
    <div id="loadingState" class="text-center py-5">
      <div class="spinner-grow me-2" role="status"><span class="visually-hidden">Loading...</span></div>
      <div class="spinner-grow me-2" style="animation-delay:0.15s" role="status"><span class="visually-hidden">Loading...</span></div>
      <div class="spinner-grow" style="animation-delay:0.3s" role="status"><span class="visually-hidden">Loading...</span></div>
      <p class="mt-3 text-muted">Loading your warehouses…</p>
    </div>

    <!-- Error state -->
    <div id="errorState" class="text-center py-5">
      <i class="bi bi-exclamation-circle text-danger" style="font-size:3rem;"></i>
      <h5 class="mt-3 text-danger" id="errorMessage">Something went wrong.</h5>
      <button class="btn btn-outline-primary mt-3" onclick="window.location.reload()">
        <i class="bi bi-arrow-clockwise me-1"></i>Try Again
      </button>
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="text-center py-5">
      <i class="bi bi-building-slash text-muted" style="font-size:3rem;"></i>
      <h5 class="mt-3 text-muted">No warehouses assigned.</h5>
      <p class="text-muted small">Please contact your administrator to assign you a warehouse.</p>
      <button class="btn btn-outline-danger mt-2" onclick="handleLogout()">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </button>
    </div>

    <!-- Warehouse grid -->
    <div id="warehouseGrid" class="row g-4 justify-content-center" style="display:none !important;"></div>

  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Config & page scripts -->
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/manager-warehouse-select.js"></script>
</body>
</html>
